<html lang="zh-TW">

  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #fff;
      --text: #1f2937;
      --muted: #667085;
      --border: #dfe4ea;
      --soft: #eef2f6;
      --accent: #2563eb;
      --accent2: #1d4ed8;
      --accentSoft: #eff6ff;
      --green: #087f5b;
      --greenSoft: #e9f7ef;
      --amber: #a16207;
      --amberSoft: #fff7ed;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }
    * {
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
      'PingFang TC', 'Microsoft JhengHei', 'PingFang SC', 'Microsoft YaHei',
      sans-serif;
      line-height: 1.65;
    }
    a {
      color: inherit;
      text-decoration: none;
    }
    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }
    .eyebrow {
      margin: 0 0 6px;
      color: var(--accent2);
      font-size: 13px;
      font-weight: 700;
    }
    .headline {
      margin: 0;
      font-size: 34px;
      line-height: 1.25;
      font-weight: 760;
    }
    .subline {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }
    .lang-switch {
      display: inline-flex;
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .lang-switch button {
      min-width: 92px;
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      padding: 8px 14px;
    }
    .lang-switch button.active {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .layout {
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }
    .version-menu {
      position: sticky;
      top: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .menu-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .nav-list {
      display: grid;
      gap: 8px;
    }
    .nav-link {
      display: block;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 11px;
      background: #f8fafc;
    }
    .nav-link:hover,
    .nav-link.active {
      border-color: #bfdbfe;
      background: var(--accentSoft);
    }
    .nav-link.active {
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .nav-link .version {
      display: block;
      font-size: 13px;
      font-weight: 760;
      line-height: 1.35;
    }
    .nav-link .date {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }
    .content {
      display: grid;
      gap: 24px;
      min-width: 0;
    }
    .release-panel {
      scroll-margin-top: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .release-head {
      padding: 24px 26px 18px;
      border-bottom: 1px solid var(--soft);
    }
    .release-title-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .release-title {
      margin: 0;
      font-size: 25px;
      line-height: 1.3;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 4px 10px;
      background: var(--accentSoft);
      color: var(--accent2);
      border: 1px solid #bfdbfe;
      font-size: 12px;
      font-weight: 700;
    }
    .release-meta {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }
    .metric {
      border: 1px solid var(--soft);
      border-radius: 8px;
      background: #fbfdff;
      padding: 13px 14px;
      min-height: 82px;
    }
    .metric .num {
      display: block;
      color: var(--accent);
      font-size: 22px;
      line-height: 1.25;
      font-weight: 780;
      word-break: break-word;
    }
    .metric .label {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }
    .release-body {
      padding: 22px 26px 26px;
    }
    .summary {
      margin: 0 0 20px;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      background: var(--accentSoft);
      color: #1e3a8a;
      padding: 14px 16px;
      font-size: 14px;
    }
    .cards {
      display: grid;
      gap: 14px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      padding: 18px 18px 16px;
    }
    .card h3 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.35;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0 0 12px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 9px;
      color: var(--muted);
      background: #f8fafc;
      font-size: 12px;
      font-weight: 650;
    }
    .tag.green {
      color: var(--green);
      border-color: #b7e4c7;
      background: var(--greenSoft);
    }
    .tag.amber {
      color: var(--amber);
      border-color: #fed7aa;
      background: var(--amberSoft);
    }
    ul {
      margin: 8px 0 0 20px;
      padding: 0;
    }
    li {
      margin: 4px 0;
    }
    code {
      border-radius: 4px;
      background: #f3f4f6;
      padding: 1px 5px;
      font-size: 12px;
    }
    .source-block {
      margin-top: 20px;
    }
    .source-block h3 {
      margin: 0 0 10px;
      font-size: 17px;
    }
    .source-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
    }
    .source-table {
      width: 100%;
      min-width: 680px;
      border-collapse: collapse;
      font-size: 13px;
    }
    .source-table th,
    .source-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--soft);
      text-align: left;
      vertical-align: top;
    }
    .source-table th {
      background: #f8fafc;
      color: #344054;
      font-weight: 760;
    }
    .source-table tr:last-child td {
      border-bottom: 0;
    }
    .source-table td:first-child {
      width: 240px;
      color: var(--accent2);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas,
      'Liberation Mono', monospace;
      font-size: 12px;
    }
    .footer {
      margin: 28px 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 980px) {
      .shell {
        padding: 24px 16px 48px;
      }
      .topbar {
        flex-direction: column;
      }
      .headline {
        font-size: 28px;
      }
      .layout {
        grid-template-columns: 1fr;
      }
      .version-menu {
        position: sticky;
        top: 0;
        z-index: 5;
        margin: 0 -16px;
        border-left: 0;
        border-right: 0;
        border-radius: 0;
        padding: 12px 16px;
      }
      .nav-list {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 2px;
        scrollbar-width: thin;
      }
      .nav-link {
        min-width: 210px;
      }
      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 560px) {
      .headline {
        font-size: 24px;
      }
      .lang-switch {
        width: 100%;
      }
      .lang-switch button {
        flex: 1;
      }
      .release-head,
      .release-body {
        padding-left: 16px;
        padding-right: 16px;
      }
      .metrics {
        grid-template-columns: 1fr;
      }
      .release-title {
        font-size: 21px;
      }
    }
  </style>
</head>

  function t(value) {
    if (value && typeof value === 'object') {
      return value[currentLang] || value.tw || value.cn || '';
    }
    return value || '';
  }
  function setStaticCopy() {
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      el.innerHTML = t(copy[el.getAttribute('data-i18n')]);
    });
    document
            .getElementById('btn-tw')
            .classList.toggle('active', currentLang === 'tw');
    document
            .getElementById('btn-cn')
            .classList.toggle('active', currentLang === 'cn');
    document.documentElement.lang =
            currentLang === 'tw' ? 'zh-TW' : 'zh-CN';
  }
  function renderNav() {
    var nav = document.getElementById('version-nav');
    nav.innerHTML = releases
            .map(function (r) {
              return (
                      '<a class="nav-link" href="#' +
                      r.id +
                      '" data-version-id="' +
                      r.id +
                      '"><span class="version">' +
                      r.version +
                      '</span><span class="date">' +
                      t(r.date) +
                      '</span></a>'
              );
            })
            .join('');
  }
  function renderMetrics(metrics) {
    return metrics
            .map(function (m) {
              return (
                      '<div class="metric"><span class="num">' +
                      m.num +
                      '</span><span class="label">' +
                      t(m.label) +
                      '</span></div>'
              );
            })
            .join('');
  }
  function renderTags(tags, index) {
    return tags
            .map(function (tag) {
              var cls =
                      index % 3 === 0 ? ' green' : index % 3 === 1 ? ' amber' : '';
              return '<span class="tag' + cls + '">' + tag + '</span>';
            })
            .join('');
  }
  function renderSections(sections) {
    return sections
            .map(function (s, index) {
              var items = s.items
                      .map(function (item) {
                        return '<li>' + t(item) + '</li>';
                      })
                      .join('');
              return (
                      '<section class="card"><h3>' +
                      t(s.title) +
                      '</h3><div class="tags">' +
                      renderTags(s.tags, index) +
                      '</div><ul>' +
                      items +
                      '</ul></section>'
              );
            })
            .join('');
  }
  function renderSources(sources) {
    return (
            '<section class="source-block"><h3>' +
            t(copy.sourceTitle) +
            '</h3><div class="source-table-wrap"><table class="source-table"><thead><tr><th>' +
            t(copy.sourceCol) +
            '</th><th>' +
            t(copy.detailCol) +
            '</th></tr></thead><tbody>' +
            sources
                    .map(function (row) {
                      return (
                              '<tr><td>' +
                              row.source +
                              '</td><td>' +
                              t(row.detail) +
                              '</td></tr>'
                      );
                    })
                    .join('') +
            '</tbody></table></div></section>'
    );
  }
  function renderContent() {
    var content = document.getElementById('release-content');
    content.innerHTML = releases
            .map(function (r) {
              return (
                      '<article id="' +
                      r.id +
                      '" class="release-panel"><header class="release-head"><div class="release-title-row"><h2 class="release-title">' +
                      r.version +
                      '</h2><span class="badge">' +
                      t(r.badge) +
                      '</span></div><p class="release-meta">' +
                      t(r.date) +
                      ' · ' +
                      t(r.meta) +
                      '</p><div class="metrics">' +
                      renderMetrics(r.metrics) +
                      '</div></header><div class="release-body"><p class="summary">' +
                      t(r.summary) +
                      '</p><div class="cards">' +
                      renderSections(r.sections) +
                      '</div>' +
                      renderSources(r.sources) +
                      '</div></article>'
              );
            })
            .join('');
  }
  function setActiveVersion(id) {
    document.querySelectorAll('.nav-link').forEach(function (link) {
      link.classList.toggle(
              'active',
              link.getAttribute('data-version-id') === id,
      );
    });
  }
  function bindNav() {
    document.querySelectorAll('.nav-link').forEach(function (link) {
      link.addEventListener('click', function () {
        setActiveVersion(link.getAttribute('data-version-id'));
      });
    });
  }
  function bindLanguageSwitch() {
    document
            .querySelectorAll('.lang-switch button')
            .forEach(function (button) {
              button.addEventListener('click', function () {
                currentLang = button.getAttribute('data-lang');
                localStorage.setItem('dsj-changelog-lang', currentLang);
                renderPage(false);
              });
            });
  }
  function observeSections() {
    if (!('IntersectionObserver' in window)) {
      setActiveVersion(
              location.hash ? location.hash.slice(1) : releases[0].id,
      );
      return;
    }
    var observer = new IntersectionObserver(
            function (entries) {
              entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                  setActiveVersion(entry.target.id);
                }
              });
            },
            { rootMargin: '-20% 0px -65% 0px', threshold: 0.01 },
    );
    releases.forEach(function (r) {
      var el = document.getElementById(r.id);
      if (el) {
        observer.observe(el);
      }
    });
  }
  function renderPage(shouldBindLanguage) {
    setStaticCopy();
    renderNav();
    renderContent();
    bindNav();
    if (shouldBindLanguage) {
      bindLanguageSwitch();
    }
    setActiveVersion(
            location.hash ? location.hash.slice(1) : releases[0].id,
    );
    observeSections();
  }
  window.addEventListener('hashchange', function () {
    setActiveVersion(
            location.hash ? location.hash.slice(1) : releases[0].id,
    );
  });
  renderPage(true);
